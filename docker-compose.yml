version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo

  model:
    image: bthzang/uitfa-model:latest
    platform: linux/amd64
    container_name: model
    ports:
      - "8002:8000"
    restart: always

volumes:
  mongo-data: